sprinkler:
  - id: ${devicename}
    main_switch:
# CHANGED: "Start/Stop/Resume" → "Start-Stop-Resume"
# The "/" character in entity names causes API protocol corruption in newer
# ESPHome versions (2024.x+). The entity ID generated from the name contains
# slashes that break protobuf serialization, causing the device to crash
# shortly after HA connects and starts communicating with the entity.
# This was fine in older ESPHome but the newer API frame helper is stricter.
      name: "Start-Stop-Resume"
      id: main_switch
      on_turn_off:
        - script.execute: handle_cycle_complete
    auto_advance_switch:
      name: "Auto Advance"
      id: auto_advance_switch
      on_turn_on:
        - script.execute: save_auto_advance_on
      on_turn_off:
        - script.execute: save_auto_advance_off
    valve_overlap: 2s
    repeat_number: "Repeat"
    valves:
      - valve_switch: ${zone_1_name}
        enable_switch:
          name: "Enable ${zone_1_name}"
          id: irrigation_controller_enable_1
        run_duration_number: ${zone_1_valve_id}
        valve_switch_id: irrigation_controller_1
      - valve_switch: ${zone_2_name}
        enable_switch:
          name: "Enable ${zone_2_name}"
          id: irrigation_controller_enable_2
        run_duration_number: ${zone_2_valve_id}
        valve_switch_id: irrigation_controller_2
      - valve_switch: ${zone_3_name}
        enable_switch:
          name: "Enable ${zone_3_name}"
          id: irrigation_controller_enable_3
        run_duration_number: ${zone_3_valve_id}
        valve_switch_id: irrigation_controller_3
      - valve_switch: ${zone_4_name}
        enable_switch:
          name: "Enable ${zone_4_name}"
          id: irrigation_controller_enable_4
        run_duration_number: ${zone_4_valve_id}
        valve_switch_id: irrigation_controller_4
      - valve_switch: ${zone_5_name}
        enable_switch:
          name: "Enable ${zone_5_name}"
          id: irrigation_controller_enable_5
        run_duration_number: ${zone_5_valve_id}
        valve_switch_id: irrigation_controller_5
      - valve_switch: ${zone_6_name}
        enable_switch:
          name: "Enable ${zone_6_name}"
          id: irrigation_controller_enable_6
        run_duration_number: ${zone_6_valve_id}
        valve_switch_id: irrigation_controller_6
button:
  - platform: template
    id: sprinkler_pause
    name: "Pause"
    icon: "mdi:pause"
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(is_paused);'
            then:
              - text_sensor.template.publish:
                  id: valve_status
                  state: "Resuming"
              - lambda: 'id(is_paused) = false;'
              - sprinkler.resume: ${devicename}
              - if:
                  condition:
                    lambda: 'return id(zone6_mode).state == "Pump Start Relay" || id(zone6_mode).state == "Master Valve";'
                  then:
                    - delay: 2s
                    - switch.turn_on: irrigation_controller_6
            else:
              - text_sensor.template.publish:
                  id: valve_status
                  state: "Paused"
              - lambda: 'id(is_paused) = true;'
              - if:
                  condition:
                    lambda: 'return id(zone6_mode).state == "Pump Start Relay" || id(zone6_mode).state == "Master Valve";'
                  then:
                    - switch.turn_off: irrigation_controller_6
              - sprinkler.pause: ${devicename}
switch:
