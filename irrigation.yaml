substitutions:
  zone_1_name: "Zone 1"
  zone_2_name: "Zone 2"
  zone_3_name: "Zone 3"
  zone_4_name: "Zone 4"
  zone_5_name: "Zone 5"
  zone_6_name: "Zone 6"
  software_version: "ESP32_V1.2"
  sensor_update_frequency: "15s"
  log_level: "DEBUG"
  zone_1_valve_id: valve_0
  zone_2_valve_id: valve_1
  zone_3_valve_id: valve_2
  zone_4_valve_id: valve_3
  zone_5_valve_id: valve_4
  zone_6_valve_id: valve_5
  esphome_name: irrigation-esp32
  esphome_comment: "Six Zone ESP32 Irrigation Controller with Flexible Zone 6"
  esphome_project_name: "FluxOpenHome.Irrigation"
  esphome_project_version: ${software_version}
  devicename: irrigation_controller
  upper_devicename: "Irrigation Controller"
  uom: "Min"
esphome:
  name: irrigation-system
  friendly_name: Irrigation System
  project:
    name: ${esphome_project_name}
    version: ${esphome_project_version}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          ESP_LOGI("boot", "=== IRRIGATION BOOT ===");
          ESP_LOGI("boot", "Firmware: ${software_version}");
          ESP_LOGI("boot", "Free heap: %u bytes", esp_get_free_heap_size());
          ESP_LOGI("boot", "Min free heap: %u bytes", esp_get_minimum_free_heap_size());
      - text_sensor.template.publish:
          id: valve_status
          state: "System Ready"
      - sprinkler.set_multiplier:
          id: ${devicename}
          multiplier: 1
      - lambda: |-
          ESP_LOGI("boot", "Boot complete. Free heap: %u bytes", esp_get_free_heap_size());
globals:
  - id: is_paused
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: user_auto_advance_pref
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: scheduled_run_active
    type: bool
    restore_value: no
    initial_value: 'false'
esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0: "y"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
  variant: esp32
logger:
  level: ${log_level}
  baud_rate: 115200
  logs:
    text_sensor: WARN
    component: ERROR
    # Verbose heap tracking
    sensor: INFO
    debug: DEBUG
    sprinkler: DEBUG
    api: DEBUG
    api.connection: DEBUG
    wifi: INFO
    safe_mode: DEBUG
debug:
  update_interval: 30s
safe_mode:
  boot_is_good_after: 60s
  num_attempts: 5
api:
  encryption:
    key: "W88o0ykHjhbBwyDmpJbKUfpvvwguEqe/U32xmXcXfoA="
  reboot_timeout: 5min
ota:
  platform: esphome
  password: "b1ec0e1fff2e77f6f206e29d48bc299d"
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  ap:
    ssid: "${esphome_name} Fallback"
    password: ""
  on_connect:
    - lambda: 'ESP_LOGI("wifi", "Connected! Heap: %u", esp_get_free_heap_size());'
  on_disconnect:
    - lambda: 'ESP_LOGW("wifi", "Disconnected! Heap: %u", esp_get_free_heap_size());'
captive_portal:
time:
  - platform: homeassistant
    id: homeassistant_time
text:
