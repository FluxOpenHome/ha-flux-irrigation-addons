    on_turn_off:
      - script.execute: check_pump_off
      - script.execute: update_valve_status
    pin:
      number: GPIO26
      inverted: false
  - platform: gpio
    name: "Relay 5"
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true
    id: irrigation_controller_5
    on_turn_on:
      - text_sensor.template.publish:
          id: valve_status
          state: "${zone_5_name} Active"
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Master Valve";'
          then:
            - switch.turn_on: irrigation_controller_6
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Pump Start Relay";'
          then:
            - delay: 2s
            - lambda: 'if (id(irrigation_controller_5).state) id(irrigation_controller_6).turn_on();'
    on_turn_off:
      - script.execute: check_pump_off
      - script.execute: update_valve_status
    pin:
      number: GPIO27
      inverted: false
  - platform: gpio
    name: "Relay 6"
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true
    id: irrigation_controller_6
    on_turn_on:
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Zone";'
          then:
            - text_sensor.template.publish:
                id: valve_status
                state: "${zone_6_name} Active"
          else:
            - if:
                condition:
                  lambda: 'return id(zone6_mode).state == "Master Valve";'
                then:
                  - text_sensor.template.publish:
                      id: valve_status
                      state: "Master Valve Open"
                else:
                  - text_sensor.template.publish:
                      id: valve_status
                      state: "Pump Running"
    on_turn_off:
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Zone";'
          then:
            - text_sensor.template.publish:
                id: valve_status
                state: "Idle"
          else:
            - if:
                condition:
                  lambda: 'return id(zone6_mode).state == "Master Valve";'
                then:
                  - text_sensor.template.publish:
                      id: valve_status
                      state: "Master Valve Closed"
                else:
                  - text_sensor.template.publish:
                      id: valve_status
                      state: "Pump Stopped"
    pin:
      number: GPIO22
      inverted: false
script:
  - id: run_all_zones
    then:
      - lambda: |-
          ESP_LOGI("irrigation", "=== Starting scheduled irrigation cycle ===");
          ESP_LOGI("irrigation", "Heap: %u free, %u min-ever", esp_get_free_heap_size(), esp_get_minimum_free_heap_size());
          id(is_paused) = false;
          id(scheduled_run_active) = true;
      - switch.turn_on: auto_advance_switch
      - switch.turn_on: main_switch
  - id: handle_cycle_complete
    then:
      - lambda: |-
          ESP_LOGI("irrigation", "=== Cycle complete ===");
          ESP_LOGI("irrigation", "Heap: %u free, %u min-ever", esp_get_free_heap_size(), esp_get_minimum_free_heap_size());
          if (id(scheduled_run_active)) {
            id(scheduled_run_active) = false;
            if (id(user_auto_advance_pref)) {
              id(auto_advance_switch).turn_on();
            } else {
              id(auto_advance_switch).turn_off();
            }
          }
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Pump Start Relay" || id(zone6_mode).state == "Master Valve";'
          then:
            - script.execute: pump_off_safe
  - id: pump_off_safe
    then:
      - logger.log: "Pump shutdown: waiting 2s before turning off pump relay"
      - delay: 2s
      - switch.turn_off: irrigation_controller_6
  - id: check_pump_off
    then:
      - if:
          condition:
            lambda: |-
              if (id(zone6_mode).state != "Pump Start Relay" && id(zone6_mode).state != "Master Valve") return false;
              bool any_active =
                id(irrigation_controller_1).state || id(irrigation_controller_2).state ||
                id(irrigation_controller_3).state || id(irrigation_controller_4).state ||
                id(irrigation_controller_5).state;
              if (any_active) return false;
              if (id(main_switch).state && (id(auto_advance_switch).state || id(scheduled_run_active))) return false;
              return true;
          then:
            - script.execute: pump_off_safe
  - id: update_valve_status
    then:
      - lambda: |-
          if (id(irrigation_controller_1).state) { id(valve_status).publish_state("${zone_1_name} Active"); return; }
          if (id(irrigation_controller_2).state) { id(valve_status).publish_state("${zone_2_name} Active"); return; }
          if (id(irrigation_controller_3).state) { id(valve_status).publish_state("${zone_3_name} Active"); return; }
          if (id(irrigation_controller_4).state) { id(valve_status).publish_state("${zone_4_name} Active"); return; }
          if (id(irrigation_controller_5).state) { id(valve_status).publish_state("${zone_5_name} Active"); return; }
          if (id(irrigation_controller_6).state) {
            if (id(zone6_mode).state == "Zone") { id(valve_status).publish_state("${zone_6_name} Active"); return; }
            if (id(zone6_mode).state == "Master Valve") { id(valve_status).publish_state("Master Valve Open"); return; }
            id(valve_status).publish_state("Pump Running"); return;
          }
          id(valve_status).publish_state("Idle");
  - id: save_auto_advance_on
    then:
      - lambda: |-
          if (!id(scheduled_run_active)) {
            id(user_auto_advance_pref) = true;
          }
  - id: save_auto_advance_off
    then:
      - lambda: |-
          if (!id(scheduled_run_active)) {
            id(user_auto_advance_pref) = false;
          }
interval:
  - interval: 1min
    then:
      - lambda: |-
          // Periodic heap health check
          static uint32_t check_count = 0;
          check_count++;
          size_t free_h = esp_get_free_heap_size();
          size_t min_h = esp_get_minimum_free_heap_size();
          if (check_count % 5 == 0) {
            ESP_LOGI("health", "Heap: %u free, %u min-ever, uptime: %us", free_h, min_h, (uint32_t)(millis()/1000));
          }
          if (free_h < 20000) {
            ESP_LOGW("health", "LOW HEAP WARNING: %u bytes free!", free_h);
          }
          if (free_h < 10000) {
            ESP_LOGE("health", "CRITICAL HEAP: %u bytes - restarting!", free_h);
            delay(100);
            esp_restart();
          }
      - lambda: |-
          auto time = id(homeassistant_time).now();
          if (!time.is_valid()) return;
          if (!id(schedule_enabled).state) return;
          int cur_h = time.hour;
          int cur_m = time.minute;
          int wd = time.day_of_week;
          // day_of_week: 1=Sun .. 7=Sat
          bool day_ok = false;
          switch (wd) {
            case 1: day_ok = id(sunday_enabled).state; break;
            case 2: day_ok = id(monday_enabled).state; break;
            case 3: day_ok = id(tuesday_enabled).state; break;
            case 4: day_ok = id(wednesday_enabled).state; break;
            case 5: day_ok = id(thursday_enabled).state; break;
            case 6: day_ok = id(friday_enabled).state; break;
            case 7: day_ok = id(saturday_enabled).state; break;
          }
          if (!day_ok) return;
          // Parse "HH:MM" or "H:MM AM/PM" into hour+minute, match against current
          auto check_time = [&](const std::string &s) -> bool {
            if (s.empty() || s.length() < 4) return false;
            int h = 0, m = 0;
            bool has_ampm = false, is_pm = false;
            for (char c : s) {
              if (c == 'P' || c == 'p') { has_ampm = true; is_pm = true; }
              if (c == 'A' || c == 'a') { has_ampm = true; }
            }
            // Find colon
            size_t cp = s.find(':');
            if (cp == std::string::npos || cp == 0) return false;
            h = atoi(s.c_str());
            m = atoi(s.c_str() + cp + 1);
            if (has_ampm) {
              if (is_pm && h != 12) h += 12;
              else if (!is_pm && h == 12) h = 0;
            }
            return (h == cur_h && m == cur_m);
          };
          if (check_time(id(schedule_start_time_1).state) ||
              check_time(id(schedule_start_time_2).state) ||
              check_time(id(schedule_start_time_3).state) ||
              check_time(id(schedule_start_time_4).state)) {
            ESP_LOGI("schedule", "Time match! Starting irrigation. Heap: %u", esp_get_free_heap_size());
            id(run_all_zones).execute();
          }
  - interval: 5s
    then:
      - lambda: |-
          // Safety: turn off pump/master valve if main switch is off
          if ((id(zone6_mode).state == "Pump Start Relay" || id(zone6_mode).state == "Master Valve") && id(irrigation_controller_6).state) {
            if (!id(main_switch).state) {
              ESP_LOGW("safety", "Pump/MV on but main switch off - turning off relay 6");
              id(irrigation_controller_6).turn_off();
            }
          }
