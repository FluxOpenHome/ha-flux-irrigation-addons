  - platform: gpio
    name: "Relay 1"
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true
    id: irrigation_controller_1
    on_turn_on:
      - text_sensor.template.publish:
          id: valve_status
          state: "${zone_1_name} Active"
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Master Valve";'
          then:
            - switch.turn_on: irrigation_controller_6
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Pump Start Relay";'
          then:
            - delay: 2s
            - lambda: 'if (id(irrigation_controller_1).state) id(irrigation_controller_6).turn_on();'
    on_turn_off:
      - script.execute: check_pump_off
      - script.execute: update_valve_status
    pin:
      number: GPIO32
      inverted: false
  - platform: gpio
    name: "Relay 2"
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true
    id: irrigation_controller_2
    on_turn_on:
      - text_sensor.template.publish:
          id: valve_status
          state: "${zone_2_name} Active"
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Master Valve";'
          then:
            - switch.turn_on: irrigation_controller_6
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Pump Start Relay";'
          then:
            - delay: 2s
            - lambda: 'if (id(irrigation_controller_2).state) id(irrigation_controller_6).turn_on();'
    on_turn_off:
      - script.execute: check_pump_off
      - script.execute: update_valve_status
    pin:
      number: GPIO33
      inverted: false
  - platform: gpio
    name: "Relay 3"
