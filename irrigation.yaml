      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Pump Start Relay";'
          then:
            - delay: 2s
            - lambda: 'if (id(irrigation_controller_3).state) id(irrigation_controller_6).turn_on();'
    on_turn_off:
      - script.execute: check_pump_off
      - script.execute: update_valve_status
    pin:
      number: GPIO25
      inverted: false
  - platform: gpio
    name: "Relay 4"
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true
    id: irrigation_controller_4
    on_turn_on:
      - text_sensor.template.publish:
          id: valve_status
          state: "${zone_4_name} Active"
      - if:
          condition:
            lambda: 'return id(zone6_mode).state == "Master Valve";'
          then:
            - switch.turn_on: irrigation_controller_6
      - if:
          condition:
