select:
  - platform: template
    id: zone6_mode
    name: "Zone 6 Mode"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_option: "Zone"
    options:
      - "Zone"
      - "Master Valve"
      - "Pump Start Relay"
text_sensor:
  - platform: version
    name: "${esphome_name} ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "${esphome_name} IP"
    ssid:
      name: "${esphome_name} SSID"
  - platform: template
    id: time_remaining
    name: "${upper_devicename} Time Remaining"
    update_interval: ${sensor_update_frequency}
    icon: "mdi:timer-sand"
    lambda: |-
      float raw_time = id(${devicename}).time_remaining_active_valve().value_or(0);
      int minutes = (int)(raw_time / 60.0);
      int seconds = (int)raw_time % 60;
      char buf[12];
      snprintf(buf, sizeof(buf), "%dm %ds", minutes, seconds);
      return std::string(buf);
  - platform: template
    id: progress_percent
    name: "${upper_devicename} Progress %"
    update_interval: ${sensor_update_frequency}
    icon: "mdi:progress-clock"
    lambda: |-
      if (!id(${devicename}).active_valve().has_value()) {
        return std::string("0%");
      }
      int active_valve = id(${devicename}).active_valve().value();
      float total_time = id(${devicename}).valve_run_duration_adjusted(active_valve);
      float remaining_time = id(${devicename}).time_remaining_active_valve().value_or(0);
      if (total_time <= 0) return std::string("0%");
      int progress = (int)round(((total_time - remaining_time) * 100.0f) / total_time);
      char buf[8];
      snprintf(buf, sizeof(buf), "%d%%", progress);
      return std::string(buf);
  - platform: debug
    device:
      name: "${upper_devicename} Device Info"
    reset_reason:
      name: "${upper_devicename} Reset Reason"
  - platform: template
    id: valve_status
    name: "${upper_devicename} Status"
    update_interval: never
    icon: "mdi:information-variant"
sensor:
  - platform: uptime
    name: "${upper_devicename} Uptime"
    id: uptime_sensor
  - platform: wifi_signal
    name: "${upper_devicename} WiFi Signal"
    update_interval: 60s
  - platform: debug
    free:
      name: "${upper_devicename} Free Heap"
      id: free_heap
    loop_time:
      name: "${upper_devicename} Loop Time"
      id: loop_time
  - platform: template
    name: "${upper_devicename} Min Free Heap"
    id: min_free_heap
    unit_of_measurement: "bytes"
    accuracy_decimals: 0
    icon: "mdi:memory"
    entity_category: diagnostic
    update_interval: 30s
    lambda: 'return esp_get_minimum_free_heap_size();'
  - platform: template
    name: "${upper_devicename} Heap Fragmentation"
    id: heap_fragmentation
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:chart-scatter-plot"
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      size_t free = esp_get_free_heap_size();
      size_t largest = heap_caps_get_largest_free_block(MALLOC_CAP_8BIT);
      if (free == 0) return 0.0f;
      return (1.0f - ((float)largest / (float)free)) * 100.0f;
